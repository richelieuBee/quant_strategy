<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票异动分析</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>" type="image/svg+xml">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            display: flex;
            gap: 20px;
            max-width: 1500px;
            width: 100%;
            margin: 0 auto;
        }
        .sidebar {
            width: 280px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 25px;
            flex-shrink: 0;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }
        .sidebar h3 {
            color: #1a365d;
            font-size: 16px;
            margin-bottom: 0;
            padding-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar h3::before {
            content: '';
            width: 4px;
            height: 18px;
            background: linear-gradient(135deg, #2e86ab 0%, #1a365d 100%);
            border-radius: 2px;
        }
        .cache-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
            margin-bottom: 20px;
        }
        .cache-list {
            list-style: none;
        }
        .cache-item {
            padding: 15px;
            background: #f8fafc;
            border-radius: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cache-item .info {
            flex: 1;
        }
        .cache-item:hover {
            background: #f1f5f9;
            border-color: #2e86ab;
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(46, 134, 171, 0.15);
        }
        .cache-item.active {
            background: linear-gradient(135deg, #e8f4f8 0%, #dbeafe 100%);
            border-color: #2e86ab;
        }
        .cache-item.warning {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            border-color: #ef4444;
        }
        .cache-item.warning:hover {
            background: linear-gradient(135deg, #fecaca 0%, #fca5a5 100%);
            border-color: #dc2626;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.2);
        }
        .cache-item.warning .stock-name {
            color: #991b1b;
        }
        .cache-item .stock-name {
            font-weight: 600;
            color: #1e293b;
            font-size: 15px;
        }
        .cache-item .stock-code {
            font-size: 13px;
            color: #64748b;
            margin-top: 4px;
        }
        .cache-item .cache-time {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 6px;
        }
        .cache-item .increase-pct {
            font-size: 28px;
            font-weight: 800;
            color: #059669;
            text-shadow: 2px 2px 4px rgba(5, 150, 105, 0.2);
        }
        .cache-item .increase-pct.warning {
            color: #dc2626;
            text-shadow: 2px 2px 4px rgba(220, 38, 38, 0.2);
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #94a3b8;
        }
        .empty-state svg {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
        .main-content {
            flex: 1;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            min-width: 0;
        }
        h1 {
            text-align: center;
            color: #1a365d;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 600;
        }
        .search-box {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            width: 100%;
        }
        .search-container {
            flex: 1;
            position: relative;
        }
        .search-box input {
            width: 100%;
            min-width: 300px;
            padding: 15px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .search-box input:focus {
            outline: none;
            border-color: #2e86ab;
        }
        .search-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 5px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            display: none;
            z-index: 100;
            max-height: 300px;
            overflow-y: auto;
        }
        .search-suggestions.show {
            display: block;
        }
        .suggestion-item {
            padding: 12px 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #f1f5f9;
        }
        .suggestion-item:hover {
            background: #f8fafc;
        }
        .suggestion-item:last-child {
            border-bottom: none;
        }
        .suggestion-item .stock-name {
            font-weight: 500;
            color: #1e293b;
        }
        .suggestion-item .stock-code {
            font-size: 13px;
            color: #64748b;
            margin-left: auto;
        }
        .suggestion-item .stock-pinyin {
            font-size: 12px;
            color: #94a3b8;
            margin-left: 10px;
        }
        .search-box button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #2e86ab 0%, #1a365d 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(46, 134, 171, 0.4);
        }
        .search-box button:active {
            transform: translateY(0);
        }
        .search-box button:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .result {
            margin-top: 30px;
            display: none;
            width: 100%;
            overflow-x: auto;
        }
        .result.show {
            display: block;
        }
        .result h2 {
            color: #2e86ab;
            margin-bottom: 20px;
            font-size: 20px;
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .delete-btn {
            background: #fee2e2;
            border: 1px solid #fca5a5;
            color: #dc2626;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .delete-btn:hover {
            background: #fca5a5;
            border-color: #dc2626;
        }
        .chart-wrapper {
            width: 100%;
            overflow-x: auto;
            overflow-y: auto;
            background: #f8fafc;
            border-radius: 0;
            padding: 0;
        }
        .chart-container {
            width: 100%;
            min-height: 400px;
            text-align: center;
            background: #f8fafc;
            padding: 10px 0;
        }
        .chart-container img {
            max-width: 100%;
            max-height: calc(100vh - 200px);
            width: 100%;
            height: auto;
            cursor: zoom-in;
            display: block;
        }
        .chart-container.empty {
            color: #94a3b8;
            text-align: center;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .loading.show {
            display: block;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2e86ab;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            display: none;
            background: #fee2e2;
            border: 1px solid #fca5a5;
            color: #dc2626;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .error.show {
            display: block;
        }
        .hint {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin-top: 20px;
        }
        .rules-box {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            margin-top: 30px;
        }
        .rules-box h4 {
            color: #1a365d;
            font-size: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .rules-box h4::before {
            content: '';
            width: 3px;
            height: 16px;
            background: #2e86ab;
            border-radius: 2px;
        }
        .rules-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .rules-list li {
            color: #475569;
            font-size: 13px;
            line-height: 1.8;
            margin-bottom: 10px;
            padding-left: 20px;
            position: relative;
        }
        .rules-list li::before {
            content: '•';
            position: absolute;
            left: 5px;
            color: #2e86ab;
            font-weight: bold;
        }
        .disclaimer {
            background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 100%);
            border: 1px solid #fed7aa;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
        }
        .disclaimer p {
            color: #9a3412;
            font-size: 13px;
            line-height: 1.8;
            margin: 0;
        }

        /* 响应式设计 - 手机端 */
        @media screen and (max-width: 768px) {
            body {
                padding: 10px;
            }
            .container {
                display: flex;
                flex-direction: column;
                gap: 15px;
                max-width: 100%;
            }
            .sidebar {
                width: 100%;
                max-height: auto;
                padding: 15px;
                border-radius: 15px;
                order: 2;
            }
            .cache-list {
                display: flex;
                gap: 10px;
                overflow-x: auto;
                padding-bottom: 10px;
                scrollbar-width: none;
            }
            .cache-list::-webkit-scrollbar {
                display: none;
            }
            .cache-item {
                flex-shrink: 0;
                width: 140px;
                padding: 12px;
                margin-bottom: 0;
                flex-direction: column;
                align-items: flex-start;
            }
            .cache-item .stock-name {
                font-size: 14px;
            }
            .cache-item .stock-code {
                font-size: 12px;
            }
            .cache-item .increase-pct {
                font-size: 20px;
                margin-top: 5px;
            }
            .main-content {
                width: 100%;
                order: 1;
                padding: 20px;
            }
            .main-content h1 {
                font-size: 20px;
                margin-bottom: 15px;
            }
            .search-box {
                flex-direction: column;
                gap: 10px;
            }
            .search-box input {
                min-width: auto;
                height: 45px;
                font-size: 16px;
            }
            .search-box button {
                height: 45px;
                padding: 0 20px;
                font-size: 16px;
            }
            .chart-container {
                padding: 10px;
                overflow-x: auto;
                min-height: auto;
            }
            .chart-container img {
                max-width: none;
            }
            .result-header h2 {
                font-size: 16px;
            }
            .delete-btn {
                padding: 8px 16px;
                font-size: 14px;
            }
            .hint {
                font-size: 12px;
            }
            .rules-box {
                padding: 15px;
                margin-top: 20px;
            }
            .rules-box h4 {
                font-size: 14px;
            }
            .rules-list li {
                font-size: 12px;
            }
            .disclaimer {
                padding: 12px;
            }
            .disclaimer p {
                font-size: 12px;
            }
        }

        /* 图片放大浮窗 */
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }
        .image-modal.show {
            display: flex;
        }
        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.3s;
        }
        .close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* 手机端浮窗图片旋转 */
        @media screen and (max-width: 768px) {
            .image-modal img {
                width: 100vh;
                height: 100vw;
                max-width: none;
                max-height: none;
                object-fit: contain;
                transform: rotate(90deg);
            }
            .close-btn {
                top: 15px;
                right: 15px;
                width: 45px;
                height: 45px;
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="cache-header">
                <h3>今日缓存</h3>
            </div>
            <ul class="cache-list" id="cacheList">
                <li class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2z"/>
                        <path d="M19 19v-6a2 2 0 00-2-2h-2a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2z"/>
                        <path d="M9 9h6"/>
                        <path d="M12 12h.01"/>
                    </svg>
                    <p>暂无缓存数据</p>
                </li>
            </ul>
        </div>
        <div class="main-content">
            <h1>股票异动价分析</h1>
            <div class="search-box">
                <div class="search-container">
                    <input type="text" id="stockInput" placeholder="请输入股票名称或代码，如：利通电子 或 603629" oninput="handleSearchInput(event)" onkeypress="handleKeyPress(event)" onfocus="handleSearchInput(event)">
                    <div class="search-suggestions" id="searchSuggestions"></div>
                </div>
                <button id="searchBtn" onclick="analyzeStock()">分析</button>
            </div>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>正在分析股票数据，请稍候...</p>
            </div>
            <div class="error" id="error"></div>
            <div class="result" id="result">
                <div class="result-header">
                    <h2 id="stockTitle"></h2>
                    <button class="delete-btn" onclick="deleteCache()">删除</button>
                </div>
                <div class="chart-wrapper">
                    <div class="chart-container" id="chartContainer">
                        <img id="chartImg" alt="股票异动图">
                    </div>
                </div>
            </div>
            <p class="hint">支持输入股票名称（如：利通电子）或股票代码（如：603629）</p>
            
            <div class="rules-box">
                <h4>使用说明</h4>
                <ul class="rules-list">
                    <li><strong>查询时间说明：</strong>15:00前查询显示的是上一个交易日的数据，15:00后查询显示的是本交易日的数据</li>
                    <li><strong>定时更新：</strong>系统会在交易日收盘后（15:30）自动更新本月热点股数据，确保您获取最新的市场信息</li>
                </ul>
                
                <div class="disclaimer">
                    <p><strong>⚠️ 免责声明：</strong>本工具仅用于股票数据分析和学习参考，不构成任何投资建议或投资指导。股市有风险，投资需谨慎，请您根据自身情况独立做出投资决策，本工具不对任何投资行为负责。</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 图片放大浮窗 -->
    <div class="image-modal" id="imageModal" onclick="closeImageModal()">
        <img id="modalImage" alt="放大图表">
        <button class="close-btn" onclick="closeImageModal()">×</button>
    </div>

    <script>
        let currentStockCode = '';
        let searchTimeout = null;

        function handleSearchInput(event) {
            const query = event.target.value.trim();
            if (searchTimeout) clearTimeout(searchTimeout);
            if (query.length < 1) {
                hideSuggestions();
                return;
            }
            searchTimeout = setTimeout(() => searchStocks(query), 200);
        }

        async function searchStocks(query) {
            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                if (data.success && data.stocks && data.stocks.length > 0) {
                    showSuggestions(data.stocks);
                } else {
                    hideSuggestions();
                }
            } catch (err) {
                console.error('搜索失败:', err);
                hideSuggestions();
            }
        }

        function showSuggestions(stocks) {
            const container = document.getElementById('searchSuggestions');
            container.innerHTML = stocks.map(stock => `
                <div class="suggestion-item" onclick="selectStock('${stock.name}', '${stock.code}')">
                    <span class="stock-name">${stock.name}</span>
                    <span class="stock-code">${stock.code}</span>
                    <span class="stock-pinyin">${stock.pinyin || ''}</span>
                </div>
            `).join('');
            container.classList.add('show');
        }

        function hideSuggestions() {
            const container = document.getElementById('searchSuggestions');
            container.classList.remove('show');
        }

        function selectStock(name, code) {
            document.getElementById('stockInput').value = name;
            hideSuggestions();
            analyzeStock();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                hideSuggestions();
                analyzeStock();
            }
        }

        async function analyzeStock() {
            const stockInput = document.getElementById('stockInput').value.trim();
            const searchBtn = document.getElementById('searchBtn');
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const result = document.getElementById('result');

            if (!stockInput) {
                showError('请输入股票名称或代码');
                return;
            }

            searchBtn.disabled = true;
            loading.classList.add('show');
            error.classList.remove('show');
            result.classList.remove('show');

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ stock: stockInput })
                });
                const data = await response.json();

                if (!response.ok || !data.success) {
                    showError(data.error || '分析失败，请稍后重试');
                    return;
                }

                currentStockCode = data.stock_code;
                document.getElementById('stockTitle').textContent = `${data.stock_name} (${data.stock_code})`;
                const chartImg = document.getElementById('chartImg');
                const chartWrapper = document.querySelector('.chart-wrapper');
                
                chartImg.src = data.image;
                chartImg.onload = function() {
                    if (chartWrapper) {
                        chartWrapper.scrollLeft = 0;
                        window.getComputedStyle(chartWrapper).width;
                        chartWrapper.scrollLeft = 0;
                    }
                };
                if (chartWrapper) {
                    chartWrapper.scrollLeft = 0;
                }
                result.classList.add('show');
                loadCacheList();
            } catch (err) {
                showError('网络错误，请检查网络连接后重试');
            } finally {
                searchBtn.disabled = false;
                loading.classList.remove('show');
            }
        }

        function showError(message) {
            const error = document.getElementById('error');
            error.textContent = message;
            error.classList.add('show');
        }

        async function loadCacheList() {
            try {
                const response = await fetch('/api/cache-list');
                const data = await response.json();
                const cacheList = document.getElementById('cacheList');

                if (!data.success || !data.cached_stocks || data.cached_stocks.length === 0) {
                    cacheList.innerHTML = `
                        <li class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2z"/>
                                <path d="M19 19v-6a2 2 0 00-2-2h-2a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2z"/>
                                <path d="M9 9h6"/>
                                <path d="M12 12h.01"/>
                            </svg>
                            <p>暂无缓存数据</p>
                        </li>
                    `;
                    return;
                }

                // 按警告状态和涨幅排序
                const sortedStocks = [...data.cached_stocks].sort((a, b) => {
                    // 警告状态优先
                    if (a.has_warning !== b.has_warning) {
                        return a.has_warning ? -1 : 1;
                    }
                    // 按涨幅从小到大排序
                    return (a.next_increase_pct || 0) - (b.next_increase_pct || 0);
                });

                cacheList.innerHTML = sortedStocks.map(stock => {
                    const isActive = stock.code === currentStockCode;
                    const isWarning = stock.has_warning;
                    const increasePct = stock.next_increase_pct;
                    const increaseClass = increasePct !== undefined && increasePct !== null && isWarning ? ' warning' : '';
                    return `
                        <li class="cache-item${isActive ? ' active' : ''}${isWarning ? ' warning' : ''}" onclick="loadCachedStock('${stock.name}', '${stock.code}')">
                            <div class="info">
                                <div class="stock-name">${stock.name}${isWarning ? ' ⚠️' : ''}</div>
                                <div class="stock-code">${stock.code}</div>
                                <div class="cache-time">${stock.cache_time}</div>
                            </div>
                            ${increasePct !== undefined && increasePct !== null ? `<div class="increase-pct${increaseClass}">${increasePct}%</div>` : ''}
                        </li>
                    `;
                }).join('');
            } catch (err) {
                console.error('加载缓存列表失败:', err);
            }
        }

        async function loadCachedStock(stockName, stockCode) {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const result = document.getElementById('result');

            loading.classList.add('show');
            error.classList.remove('show');
            result.classList.remove('show');

            try {
                const response = await fetch('/api/load-cached', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ stock_name: stockName, stock_code: stockCode })
                });
                const data = await response.json();

                if (!response.ok || !data.success) {
                    showError(data.error || '加载失败，请稍后重试');
                    return;
                }

                currentStockCode = stockCode;
                document.getElementById('stockTitle').textContent = `${stockName} (${stockCode})`;
                const chartImg = document.getElementById('chartImg');
                const chartWrapper = document.querySelector('.chart-wrapper');
                
                chartImg.src = data.image;
                chartImg.onload = function() {
                    if (chartWrapper) {
                        chartWrapper.scrollLeft = 0;
                        window.getComputedStyle(chartWrapper).width;
                        chartWrapper.scrollLeft = 0;
                    }
                };
                if (chartWrapper) {
                    chartWrapper.scrollLeft = 0;
                }
                result.classList.add('show');
                loadCacheList();
            } catch (err) {
                showError('网络错误，请检查网络连接后重试');
            } finally {
                loading.classList.remove('show');
            }
        }

        async function deleteCache() {
            if (!currentStockCode) return;

            if (!confirm('确定要删除此缓存吗？')) return;

            try {
                const response = await fetch('/api/delete-cached', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ stock_code: currentStockCode })
                });
                const data = await response.json();

                if (data.success) {
                    currentStockCode = '';
                    document.getElementById('result').classList.remove('show');
                    loadCacheList();
                } else {
                    showError(data.error || '删除失败');
                }
            } catch (err) {
                showError('网络错误');
            }
        }

        function openImageModal() {
            const chartImg = document.getElementById('chartImg');
            const modal = document.getElementById('imageModal');
            const modalImage = document.getElementById('modalImage');
            
            if (chartImg.src) {
                modalImage.src = chartImg.src;
                modal.classList.add('show');
                document.body.style.overflow = 'hidden';
            }
        }

        function closeImageModal() {
            const modal = document.getElementById('imageModal');
            modal.classList.remove('show');
            document.body.style.overflow = '';
        }

        document.addEventListener('DOMContentLoaded', function() {
            const chartImg = document.getElementById('chartImg');
            if (chartImg) {
                chartImg.addEventListener('click', openImageModal);
            }
            
            const chartWrapper = document.querySelector('.chart-wrapper');
            if (chartWrapper) {
                const observer = new MutationObserver(function(mutations) {
                    chartWrapper.scrollLeft = 0;
                });
                observer.observe(chartWrapper, { childList: true, subtree: true });
                
                setTimeout(function() {
                    chartWrapper.scrollLeft = 0;
                }, 100);
            }
        });

        function resetScrollPosition() {
            const chartWrapper = document.querySelector('.chart-wrapper');
            if (chartWrapper) {
                requestAnimationFrame(function() {
                    chartWrapper.scrollLeft = 0;
                });
            }
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') closeImageModal();
        });

        loadCacheList();
    </script>
</body>
</html>
